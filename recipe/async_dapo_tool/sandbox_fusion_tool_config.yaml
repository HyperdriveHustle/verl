tools:
  - class_name: "recipe.async_dapo_tool.custom_unit.CustomSandboxFusionTool"
    config:
      sandbox_fusion_url: "http://10.127.16.170:28893/run"
      num_workers: 128
      enable_global_rate_limit: true
      rate_limit: 128
      default_timeout: 60
      default_language: "python"
      memory_limit_mb: 5120
      type: native

    tool_schema:
      type: "function"
      function:
        name: "code_interpreter"
        description: "A tool for executing code."
        parameters:
          type: "object"
          properties:
            code:
              type: "string"
              description: "The code to execute."
          required: ["code"]

            - name: ib-config #必须有，不修改，本次升级改动
              emptyDir:
                medium: ""
                sizeLimit: "500Mi"
            - name: vscode
              hostPath:
                path: /nvfile-heatstorage/tele_data_share/public
                type: Directory
            - name: data02
              hostPath:
                path: /data02
                type: Directory
            - name: vsixs
              hostPath:
                path: /nvfile-heatstorage/tele_data_share/public/vsixs
          securityContext:
            runAsUser: 0